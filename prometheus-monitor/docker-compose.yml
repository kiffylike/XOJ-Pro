services:
  prometheus:
    image: prom/prometheus:v3.10.0-rc.1
    container_name: prometheus
    volumes:
      - /root/prometheus-monitor/prometheus.yml:/etc/prometheus/prometheus.yml
      - /root/prometheus-monitor/alert_rules.yml:/etc/prometheus/alert_rules.yml # <--- 新增这一行！把规则文件挂载进去！
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    ports:
      - "9100:9100"
    restart: unless-stopped
  
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - /root/prometheus-monitor/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    restart: unless-stopped

  dingtalk-webhook:
    image: timonwong/prometheus-webhook-dingtalk:latest
    container_name: dingtalk-webhook
    volumes:
      - /root/prometheus-monitor/dingtalk_config.yml:/etc/prometheus-webhook-dingtalk/config.yml
    ports:
      - "8060:8060"
    restart: unless-stopped


volumes:
  prometheus_data:
  grafana_data:
