# Logstash pipeline：GIITOJ 日志解析与路由
# 处理来自 Filebeat 的所有 GIITOJ 服务日志

input {
  beats {
    port => 5044
  }
}

filter {
  # ── Nginx 访问日志解析（Combined 格式） ──────────────────────────────
  if "nginx-access" in [tags] {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:remote_user} \[%{HTTPDATE:timestamp}\] "%{WORD:http_method} %{URIPATHPARAM:request_uri} HTTP/%{NUMBER:http_version}" %{NUMBER:status_code:int} %{NUMBER:bytes_sent:int} "%{DATA:http_referer}" "%{DATA:user_agent}" "%{DATA:x_forwarded_for}"'
      }
      tag_on_failure => ["_grok_nginx_failure"]
    }
    if "_grok_nginx_failure" not in [tags] {
      date {
        match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
        target => "@timestamp"
        remove_field => ["timestamp"]
      }
      # 解析 HTTP 状态码区间
      if [status_code] >= 500 {
        mutate { add_field => { "log_level" => "ERROR" } }
      } else if [status_code] >= 400 {
        mutate { add_field => { "log_level" => "WARN" } }
      } else {
        mutate { add_field => { "log_level" => "INFO" } }
      }
    }
    mutate { add_field => { "[@metadata][index]" => "giitoj-nginx-access" } }
  }

  # ── Nginx 错误日志解析 ──────────────────────────────────────────────
  else if "nginx-error" in [tags] {
    grok {
      match => {
        "message" => '%{DATA:timestamp} \[%{LOGLEVEL:log_level}\] %{POSINT:pid}#%{NUMBER}: %{GREEDYDATA:error_message}'
      }
      tag_on_failure => ["_grok_nginx_error_failure"]
    }
    mutate { add_field => { "[@metadata][index]" => "giitoj-nginx-error" } }
  }

  # ── Gunicorn 日志解析（格式：[时间] [级别] 消息） ──────────────────
  else if "gunicorn" in [tags] {
    grok {
      match => {
        "message" => '\[%{TIMESTAMP_ISO8601:timestamp}\] \[%{POSINT:pid}\] \[%{LOGLEVEL:log_level}\] %{GREEDYDATA:log_message}'
      }
      tag_on_failure => ["_grok_gunicorn_failure"]
    }
    mutate { add_field => { "[@metadata][index]" => "giitoj-app" } }
  }

  # ── Dramatiq 异步任务日志 ───────────────────────────────────────────
  else if "dramatiq" in [tags] {
    grok {
      match => {
        "message" => '\[%{TIMESTAMP_ISO8601:timestamp}\] \[%{DATA:process_info}\] \[%{LOGLEVEL:log_level}\] %{GREEDYDATA:log_message}'
      }
      tag_on_failure => ["_grok_dramatiq_failure"]
    }
    mutate { add_field => { "[@metadata][index]" => "giitoj-app" } }
  }

  # ── Supervisord 日志 ────────────────────────────────────────────────
  else if "supervisord" in [tags] {
    grok {
      match => {
        "message" => '%{TIMESTAMP_ISO8601:timestamp},%{INT} %{LOGLEVEL:log_level} %{GREEDYDATA:log_message}'
      }
      tag_on_failure => ["_grok_supervisord_failure"]
    }
    mutate { add_field => { "[@metadata][index]" => "giitoj-app" } }
  }

  # ── 判题服务日志 ────────────────────────────────────────────────────
  else if "judge" in [tags] {
    mutate { add_field => { "[@metadata][index]" => "giitoj-judge" } }
  }

  # ── 前端 Nginx 日志 ─────────────────────────────────────────────────
  else if "frontend" in [tags] {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:remote_user} \[%{HTTPDATE:timestamp}\] "%{WORD:http_method} %{URIPATHPARAM:request_uri} HTTP/%{NUMBER:http_version}" %{NUMBER:status_code:int} %{NUMBER:bytes_sent:int} "%{DATA:http_referer}" "%{DATA:user_agent}" "%{DATA:x_forwarded_for}"'
      }
      tag_on_failure => ["_grok_frontend_failure"]
    }
    if "_grok_frontend_failure" not in [tags] {
      date {
        match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
        target => "@timestamp"
        remove_field => ["timestamp"]
      }
    }
    mutate { add_field => { "[@metadata][index]" => "giitoj-frontend" } }
  }

  # ── 未匹配日志归入默认桶 ────────────────────────────────────────────
  else {
    mutate { add_field => { "[@metadata][index]" => "giitoj-unknown" } }
  }

  # ── 公共字段清理 ────────────────────────────────────────────────────
  mutate {
    add_field => { "platform" => "GIITOJ" }
    remove_field => ["agent", "ecs", "input", "log"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index]}-%{+yyyy.MM.dd}"
    # 提高写入性能
    bulk_max_size => 200
    workers => 2
  }

  # 调试时可开启下方 stdout，查看解析结果（生产环境注释掉）
  # stdout { codec => rubydebug }
}
