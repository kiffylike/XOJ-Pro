# GIITOJ ELK 日志栈
# 启动命令: docker-compose -f elk-stack/docker-compose.yml up -d
# 停止命令: docker-compose -f elk-stack/docker-compose.yml down

services:

  # ─────────────────────────────────────────────
  # Elasticsearch：日志存储与全文索引
  # ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: giitoj-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false          # 校园环境关闭安全认证，简化部署
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m        # 限制堆内存，适配低配服务器
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - elk

  # ─────────────────────────────────────────────
  # Logstash：日志解析、字段提取与路由
  # ─────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: giitoj-logstash
    restart: always
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ./logstash/pipeline/giitoj.conf:/usr/share/logstash/pipeline/giitoj.conf:ro
      - ./logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5044:5044"   # Beats 输入端口
    networks:
      - elk

  # ─────────────────────────────────────────────
  # Kibana：Web 可视化界面
  # ─────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: giitoj-kibana
    restart: always
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"   # Kibana Web UI，浏览器访问 http://<服务器IP>:5601
    networks:
      - elk

  # ─────────────────────────────────────────────
  # Filebeat：轻量日志采集代理（挂载宿主机日志目录）
  # ─────────────────────────────────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    container_name: giitoj-filebeat
    restart: always
    user: root                                # 需要 root 权限读取日志文件
    depends_on:
      - logstash
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      # 后端日志目录（gunicorn / nginx / dramatiq / supervisord）
      - ../data/backend/log:/logs/backend:ro
      # 判题服务日志目录
      - ../data/judge_server/log:/logs/judge:ro
      # 前端 Nginx 日志目录（需先在 docker-compose.yml 的 oj-frontend 添加挂载）
      - ../data/frontend/log:/logs/frontend:ro
      # Filebeat 注册表（断点续传，不丢日志）
      - filebeat_data:/usr/share/filebeat/data
    command: filebeat -e -strict.perms=false
    networks:
      - elk

volumes:
  es_data:
    driver: local
  filebeat_data:
    driver: local

networks:
  elk:
    driver: bridge
